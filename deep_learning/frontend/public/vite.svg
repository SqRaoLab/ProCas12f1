<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景（可选） -->
  <!-- <rect width="200" height="200" fill="#f9f9f9"/> -->

  <!-- crRNA (guide RNA) - 弧线表示 -->
  <path d="M50,100 Q100,60 150,100" stroke="#2563eb" stroke-width="4" fill="none"/>

  <!-- Target DNA (双链) -->
  <!-- Top strand -->
  <line x1="50" y1="120" x2="150" y2="120" stroke="#16a34a" stroke-width="3"/>
  <!-- Bottom strand -->
  <line x1="50" y1="130" x2="150" y2="130" stroke="#16a34a" stroke-width="3"/>

  <!-- Staggered cut (粘性末端) -->
  <!-- Left cut: top strand longer -->
  <line x1="80" y1="120" x2="80" y2="110" stroke="#dc2626" stroke-width="2" stroke-dasharray="2,2"/>
  <line x1="90" y1="130" x2="90" y2="140" stroke="#dc2626" stroke-width="2" stroke-dasharray="2,2"/>

  <!-- Right cut: bottom strand longer -->
  <line x1="120" y1="120" x2="120" y2="110" stroke="#dc2626" stroke-width="2" stroke-dasharray="2,2"/>
  <line x1="110" y1="130" x2="110" y2="140" stroke="#dc2626" stroke-width="2" stroke-dasharray="2,2"/>

  <!-- Cas12 protein (simplified blob) -->
  <ellipse cx="100" cy="85" rx="30" ry="20" fill="none" stroke="#7c3aed" stroke-width="3"/>

  <!-- Label (optional) -->
  <!-- <text x="100" y="180" font-family="Arial" font-size="16" text-anchor="middle" fill="#333">Cas12</text> -->
</svg>